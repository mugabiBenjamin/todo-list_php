server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    root /var/www/todo-list-php/public;
    index index.php;

    ssl_certificate     /etc/ssl/certs/your-domain.crt;
    ssl_certificate_key /etc/ssl/private/your-domain.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self';" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_buffers          16 16k;
        fastcgi_buffer_size      32k;
        fastcgi_read_timeout     30;
        fastcgi_connect_timeout  10;
        fastcgi_send_timeout     30;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(env|log|json|lock|md|xml|yaml|yml)$ {
        deny all;
    }

    location ~* \.(css|js|ico|woff2?)$ {
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    client_max_body_size 2M;

    access_log /var/log/nginx/todo-list-php.access.log;
    error_log  /var/log/nginx/todo-list-php.error.log warn;
}