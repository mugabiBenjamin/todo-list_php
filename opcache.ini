[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0

; Memory allocated for compiled bytecode — 128 MB is sufficient for this app
opcache.memory_consumption     = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 4000

; Disable revalidation in production — PHP won't stat files on each request
; Set to 1 in development so changes are picked up immediately
opcache.validate_timestamps    = 0
opcache.revalidate_freq        = 0

opcache.fast_shutdown          = 1
opcache.save_comments          = 0

; JIT — tracing mode, allocates 64 MB for JIT-compiled native code (PHP 8.0+)
opcache.jit                    = tracing
opcache.jit_buffer_size        = 64M