[todo-list-php]

user  = www-data
group = www-data

listen = /run/php/php8.2-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Dynamic scaling — FPM spawns workers as needed up to pm.max_children
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6

; Recycle workers after 500 requests to prevent memory bloat
pm.max_requests = 500

pm.status_path = /fpm-status

request_terminate_timeout = 30s
request_slowlog_timeout   = 5s
slowlog = /var/log/php-fpm/todo-list-php.slow.log

php_admin_value[error_log]        = /var/log/php-fpm/todo-list-php.error.log
php_admin_flag[log_errors]        = on
php_admin_flag[display_errors]    = off
php_admin_value[session.save_path] = /var/lib/php/sessions/todo-list-php

php_admin_value[open_basedir]     = /var/www/todo-list-php:/tmp